name: Dynamic Manual Build and Push Image

on:
  workflow_dispatch: # 开启手动触发并配置参数
    inputs:
      image_name:
        description: '请输入镜像名称 (例如: ceph, ceph-csi-operator)'
        required: true
        default: 'ceph'
      image_version:
        description: '请输入镜像版本号 (例如: v19.2.4)'
        required: true
        default: 'v19.2.4'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Alibaba Cloud ACR
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        # 动态引用页面输入的 镜像名称 和 版本号
        tags: |
          ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_version }}
          ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ github.event.inputs.image_name }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
