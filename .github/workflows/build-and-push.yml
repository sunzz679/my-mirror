name: Dynamic Manual Sync Image (No Dockerfile Needed)

on:
  workflow_dispatch:
    inputs:
      upstream_image:
        description: '源镜像地址 (例如: quay.io/ceph/ceph)'
        required: true
        default: 'quay.io/ceph/ceph'
      image_name:
        description: '阿里云上的镜像名 (例如: ceph)'
        required: true
        default: 'ceph'
      image_version:
        description: '镜像版本号 (例如: v19.2.4)'
        required: true
        default: 'v19.2.4'

jobs:
  sync-image:
    runs-on: ubuntu-latest

    steps:
    # 1. 登录阿里云
    - name: Log in to Alibaba Cloud ACR
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 2. 直接从官方源拉取、改名、推送到阿里云（完全不需要仓库里有 Dockerfile）
    - name: Pull, Tag and Push
      run: |
        # 拉取官方镜像
        docker pull ${{ github.event.inputs.upstream_image }}:${{ github.event.inputs.image_version }}
        
        # 打上阿里云私有仓的标签
        docker tag ${{ github.event.inputs.upstream_image }}:${{ github.event.inputs.image_version }} ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_version }}
        docker tag ${{ github.event.inputs.upstream_image }}:${{ github.event.inputs.image_version }} ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ github.event.inputs.image_name }}:latest
        
        # 推送到阿里云
        docker push ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_version }}
        docker push ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ github.event.inputs.image_name }}:latest
